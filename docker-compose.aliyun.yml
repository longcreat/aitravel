services:
  backend:
    build:
      context: ./backend
    container_name: aitravel-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/config/mcp.servers.json:/app/config/mcp.servers.json:ro
