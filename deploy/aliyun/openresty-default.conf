# Default fallback server for OpenResty.
#
# 任何未匹配到具体 server_name 的请求都会落到这里。我们刻意**不**把它兜底
# 成 aitravel 站点,以免任何未配置的子域(例如 mail.aigoway.tech)意外
# 暴露 aitravel 的前端和 /api/ 接口。
#
# 行为:
#   * 80 端口保留 ACME challenge 端点(Let's Encrypt 续期需要)。
#   * 80 端口其他路径与 443 端口的所有路径一律返回 444 (close connection),
#     不暴露任何业务内容。
#
# 该 server 块用 ssl_reject_handshake on 优雅拒绝未知 host 的 SNI 握手,
# 避免误用 aitravel 证书代答其他子域。

server {
    listen 80 default_server;
    server_name _;

    # 仅放行 ACME challenge,保留 Let's Encrypt 续期通道。
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
    }

    # 内部监控保留(只能从 localhost 访问 nginx,不会经公网)。
    location = /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # 任何其他请求 (包括 /api/, /, 任意子域)直接关闭连接。
    location / {
        return 444;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # 关键:拒绝任何未知 host 的 SNI 握手,客户端会看到一个 "no SSL"
    # 的失败而不是 aitravel 的内容。需要 OpenResty / nginx 1.19.4+。
    ssl_reject_handshake on;
}
